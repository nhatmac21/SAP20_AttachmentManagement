<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Attachment Management - FLP Sandbox</title>

    <script>
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            bootstrapPlugins: {
                "RuntimeAuthoringPlugin": {
                    component: "sap.ushell.plugins.rta",
                    config: {
                        validateAppVersion: false
                    }
                }
            },
            renderers: {
                fiori2: {
                    componentData: {
                        config: {
                            enableSearch: false,
                            rootIntent: "Shell-home"
                        }
                    }
                }
            },
            services: {
                "LaunchPage": {
                    "adapter": {
                        "config": {
                            "groups": [{
                                "tiles": [{
                                    "tileType": "sap.ushell.ui.tile.StaticTile",
                                    "properties": {
                                        "title": "Attachment Management",
                                        "subtitle": "Manage Attachments",
                                        "infoState": "Neutral",
                                        "info": "Fiori App",
                                        "icon": "sap-icon://attachment",
                                        "targetURL": "#zattachzattachfe-display"
                                    }
                                }]
                            }]
                        }
                    }
                },
                "ClientSideTargetResolution": {
                    "adapter": {
                        "config": {
                            "inbounds": {
                                "zattachzattachfe-display": {
                                    "semanticObject": "zattachzattachfe",
                                    "action": "display",
                                    "title": "Attachment Management",
                                    "signature": {
                                        "parameters": {},
                                        "additionalParameters": "allowed"
                                    },
                                    "resolutionResult": {
                                        "applicationType": "SAPUI5",
                                        "additionalInformation": "SAPUI5.Component=zattach.zattachfe",
                                        "url": "/",
                                        "applicationDependencies": {
                                            "name": "zattach.zattachfe",
                                            "self": {
                                                "name": "zattach.zattachfe"
                                            },
                                            "manifest": true,
                                            "asyncHints": {
                                                "libs": [
                                                    {
                                                        "name": "sap.fe.templates"
                                                    }
                                                ]
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "NavTargetResolution": {
                    "config": {
                        "enableClientSideTargetResolution": true
                    }
                }
            }
        };
    </script>

    <script
        src="https://ui5.sap.com/1.120.0/test-resources/sap/ushell/bootstrap/sandbox.js"
        id="sap-ushell-bootstrap">
    </script>

    <script
        src="https://ui5.sap.com/1.120.0/resources/sap-ui-core.js"
        data-sap-ui-libs="sap.m, sap.ushell, sap.fe.templates"
        data-sap-ui-async="true"
        data-sap-ui-preload="async"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-language="en"
        data-sap-ui-resourceroots='{
            "zattach.zattachfe": "../"
        }'
        data-sap-ui-frameOptions="allow"
        data-sap-ui-xx-componentPreload="off">
    </script>

    <script>
        sap.ui.getCore().attachInit(function() {
            sap.ushell.Container.createRenderer().placeAt("content");
        });
    </script>
</head>
<body class="sapUiBody" id="content">
</body>
</html>
